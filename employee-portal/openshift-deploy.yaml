# ── OpenShift Deployment Manifest ───────────────────────────────────
# Copy this file to openshift-deploy.local.yaml and fill in your real
# values before applying. openshift-deploy.local.yaml is gitignored
# and will never be committed.
#
# Apply with: oc apply -f openshift-deploy.local.yaml
# ─────────────────────────────────────────────────────────────────────

# 1. Project (namespace)
apiVersion: project.openshift.io/v1
kind: Project
metadata:
  name: employee-portal
  annotations:
    openshift.io/description: "Nexus Corp Employee Portal"

---

# 2. ConfigMap — Azure AD public config (non-sensitive)
apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-config
  namespace: employee-portal
data:
  REACT_APP_AZURE_TENANT_ID: "YOUR_TENANT_ID"
  REACT_APP_REDIRECT_URI: "https://employee-portal.apps.YOUR_CLUSTER_DOMAIN"

---

# 3. Secret — Azure AD Client Secret (sensitive)
apiVersion: v1
kind: Secret
metadata:
  name: portal-secret
  namespace: employee-portal
type: Opaque
stringData:
  REACT_APP_AZURE_CLIENT_ID: "YOUR_CLIENT_ID"
  REACT_APP_AZURE_CLIENT_SECRET: "YOUR_CLIENT_SECRET"

---

# 4. Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-portal
  namespace: employee-portal
  labels:
    app: employee-portal
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee-portal
  template:
    metadata:
      labels:
        app: employee-portal
    spec:
      containers:
        - name: employee-portal
          image: YOUR_REGISTRY/employee-portal:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: portal-config
            - secretRef:
                name: portal-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---

# 5. Service
apiVersion: v1
kind: Service
metadata:
  name: employee-portal
  namespace: employee-portal
spec:
  selector:
    app: employee-portal
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

---

# 6. Route (OpenShift ingress with TLS)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: employee-portal
  namespace: employee-portal
spec:
  host: employee-portal.apps.YOUR_CLUSTER_DOMAIN
  to:
    kind: Service
    name: employee-portal
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
